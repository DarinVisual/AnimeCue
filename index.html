<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeCue — Legal</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --text: #e8e8f0;
      --text-muted: #8a8aa0;
      --accent: #6c5ce7;
      --border: #1e1e2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 18px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: border-color 0.2s, transform 0.1s;
    }
    .links a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .links a:active {
      transform: translateY(0);
    }
    .lang-tag {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 8px;
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">AnimeCue</div>
    <p class="tagline">Anime scene logging &amp; brainstorming</p>

    <div class="links">
      <a href="privacy-en.html">Privacy Policy <span class="lang-tag">English</span></a>
      <a href="privacy-fr.html">Politique de confidentialité <span class="lang-tag">Français</span></a>
      <a href="terms-en.html">Terms of Use <span class="lang-tag">English</span></a>
      <a href="terms-fr.html">Conditions d'utilisation <span class="lang-tag">Français</span></a>
    </div>

    <footer>
      AnimeCue — Made by AMV Editor @Darin
    </footer>
  </div>
</body>
</html>
